<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKIBIDI 帝国的工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #ffffff;
            font-family: "KaiTi", "楷体", serif;
        }
        /* 登录答题界面 */
        .login-box {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        .login-title {
            font-size: 32px;
            color: #000;
            text-align: center;
        }
        .question-text {
            font-size: 22px;
            color: #000;
        }
        .options-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: min(300px, 80vw);
        }
        .option-btn {
            width: 100%;
            height: 52px;
            font-size: 18px;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .option-btn:active {
            transform: scale(1.05);
        }
        .error-tip {
            color: red;
            font-size: 18px;
            opacity: 0;
        }
        /* 工作室主界面（默认隐藏） */
        .main-page {
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            gap: 60px;
        }
        .main-title {
            font-size: 36px;
            color: #000000;
            white-space: nowrap;
        }
        .btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .common-btn {
            width: min(320px, 85vw);
            height: 56px;
            font-size: 19px;
            border: 2px solid #000;
            border-radius: 12px;
            background: #fff;
            color: #000;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .common-btn:active {
            transform: scale(1.05);
        }
        .disabled-btn {
            pointer-events: none;
        }
        .float-notice {
            position: fixed;
            left: 50%;
            top: 42%;
            transform: translateX(-50%);
            font-size: 20px;
            color: #000000;
            white-space: nowrap;
            opacity: 0;
            z-index: 999;
            animation: floatUp 2.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, 0); }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -120px); }
        }
    </style>
</head>
<body>
    <!-- 答题验证页面，每次打开都显示 -->
    <div class="login-box" id="loginScreen">
        <div class="login-title">SKIBIDI帝国工作室 准入验证</div>
        <div class="question-text">我们的家在哪？</div>
        <div class="options-box">
            <button class="option-btn" data-ans="A">A 大城堡</button>
            <button class="option-btn" data-ans="B">B 郯城</button>
            <button class="option-btn" data-ans="C">C 台湾</button>
        </div>
        <div class="error-tip" id="wrongTip">答案错误，无法进入工作室，请重新选择</div>
    </div>

    <!-- 工作室主页面（初始隐藏） -->
    <div class="main-page" id="workSpace">
        <h1 class="main-title">SKIBIDI 帝国的工作室</h1>
        <div class="btn-wrapper">
            <button class="common-btn" id="btnHelp">寻求帮助</button>
            <button class="common-btn" id="btnFind">寻找天保</button>
            <button class="common-btn" id="btnLink">如何再次打开这个网站</button>
            <button class="common-btn disabled-btn">我不是按钮</button>
        </div>
    </div>

    <script>
        const correctAnswer = "B"; // 正确答案：郯城
        const loginScreen = document.getElementById("loginScreen");
        const workSpace = document.getElementById("workSpace");
        const wrongTip = document.getElementById("wrongTip");
        const optionBtns = document.querySelectorAll(".option-btn");
        const pageUrl = window.location.href;

        // 选择题点击验证
        optionBtns.forEach(btn => {
            btn.onclick = function() {
                const selectAns = this.getAttribute("data-ans");
                if (selectAns === correctAnswer) {
                    // 答对显示主页面
                    loginScreen.style.display = "none";
                    workSpace.style.display = "flex";
                    wrongTip.style.opacity = 0;
                } else {
                    // 答错提示错误
                    wrongTip.style.opacity = 1;
                }
            }
        })

        // 漂浮提示文字函数
        function showFloatMsg(text) {
            const oldTip = document.querySelector(".float-notice");
            if (oldTip) oldTip.remove();
            const tipDom = document.createElement("div");
            tipDom.className = "float-notice";
            tipDom.textContent = text;
            document.body.appendChild(tipDom);
        }

        // 功能按钮逻辑
        document.getElementById("btnHelp").onclick = () => {
            showFloatMsg("等待审核员审核");
        }
        document.getElementById("btnFind").onclick = () => {
            showFloatMsg("天保是永远找不来的");
        }
        document.getElementById("btnLink").onclick = async () => {
            try {
                await navigator.clipboard.writeText(pageUrl);
                showFloatMsg("网站链接已复制，粘贴即可打开");
            } catch (err) {
                showFloatMsg(`网站链接：${pageUrl}`);
            }
        }
    </script>
</body>
</html>
