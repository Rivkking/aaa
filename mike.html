<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKIBIDI 帝国的工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #ffffff;
            font-family: "KaiTi", "楷体", serif;
            overflow: hidden;
        }
        /* 顶部左右布局 */
        .top-header {
            position: fixed;
            top: 12px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
        }
        .user-label {
            font-size: 20px;
            color: #000;
        }
        .coin-bar {
            display:none;
            align-items:center;
            gap:10px;
            font-size:20px;
        }
        /* ST金币样式 */
        .st-coin {
            width:44px;
            height:44px;
            border-radius:50%;
            background: radial-gradient(circle at 30% 30%, #fff8b8, #ffd700 40%, #b8860b 80%, #805c00);
            box-shadow: inset -6px -6px 12px rgba(90,50,0,0.5), inset 4px 4px 8px rgba(255,255,220,0.8), 0 0 10px rgba(255,200,0,0.4);
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
            color:#503800;
            font-size:18px;
        }
        /* 登录注册面板 */
        .account-box {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .acc-title {
            font-size: 30px;
            color: #000;
        }
        .acc-input {
            width: min(300px,80vw);
            height: 48px;
            border: 2px solid #000;
            padding: 0 12px;
            font-size:17px;
            outline:none;
        }
        .acc-btn {
            width: min(300px,80vw);
            height: 48px;
            border:2px solid #000;
            background:#fff;
            font-size:17px;
            cursor:pointer;
            transition:0.15s;
        }
        .acc-btn:active {transform:scale(1.04);}
        .acc-tip {
            color:red;
            font-size:17px;
        }
        /* 答题面板 */
        .login-box {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            display:none;
        }
        .login-title {
            font-size: 32px;
            color: #000;
            text-align: center;
        }
        .question-text {
            font-size: 22px;
            color: #000;
        }
        #answerInput {
            width: min(300px, 80vw);
            height: 52px;
            font-size: 18px;
            border: 2px solid black;
            padding: 0 15px;
            outline: none;
        }
        #submitBtn {
            width: min(300px, 80vw);
            height: 52px;
            font-size: 18px;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            cursor: pointer;
            transition: transform 0.15s;
        }
        #submitBtn:active {
            transform: scale(1.05);
        }
        .error-tip {
            color: red;
            font-size: 18px;
            opacity: 0;
        }
        /* 黑屏遮罩（每次进入必播放） */
        .blackMask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .mask-text {
            font-size: 60px;
            color: #fff;
            font-family: "KaiTi",楷体;
        }
        .char {
            opacity: 0;
        }
        /* 工作室主页 */
        .main-page {
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            gap: 40px;
            width:100%;
        }
        .main-title {
            font-size: 36px;
            color: #000000;
            white-space: nowrap;
        }
        .menu-box {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .menu-btn {
            width: min(320px, 85vw);
            height: 56px;
            font-size: 19px;
            border: 2px solid #000;
            border-radius: 12px;
            background: #fff;
            color: #000;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .menu-btn:active {
            transform: scale(1.05);
        }
        .menu-btn:disabled {
            background:#eee;
            color:#777;
            cursor:not-allowed;
            transform:none;
        }
        .disabled-btn {
            pointer-events: none;
        }
        .float-notice {
            position: fixed;
            left: 50%;
            top: 42%;
            transform: translateX(-50%);
            font-size: 20px;
            color: #000000;
            white-space: nowrap;
            opacity: 0;
            z-index: 999;
            animation: floatUp 2.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, 0); }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -120px); }
        }
        @keyframes charShow {
            from {opacity:0;transform: translateY(10px);}
            to {opacity:1;transform: translateY(0);}
        }
        @keyframes maskFadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* ========== 新增：反馈弹窗样式 ========== */
        .feedback-modal {
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.6);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .feedback-box {
            width: min(340px,90vw);
            background: white;
            padding: 24px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            gap:16px;
        }
        .feedback-title {
            font-size:22px;
            text-align:center;
        }
        #feedbackInput {
            height: 120px;
            border:2px solid #000;
            padding:10px;
            font-size:17px;
            outline:none;
        }
        .feedback-buttons {
            display:flex;
            gap:12px;
        }
        .feed-btn {
            flex:1;
            height:46px;
            border:2px solid #000;
            background:#fff;
            font-size:17px;
            cursor:pointer;
        }

        /* ========== 新增：猜数字游戏页面 渐变背景 ========== */
        .guess-game-page {
            width:100%;
            height:100vh;
            display:none;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:22px;
            background: linear-gradient(135deg,#74ebd5,#ACB6E5);
            padding-top:70px;
        }
        .game-title {
            font-size:34px;
        }
        .game-range {
            font-size:22px;
        }
        .game-record {
            width: min(320px,85vw);
            height:160px;
            background:#fff;
            border:2px solid #000;
            padding:10px;
            overflow-y:auto;
            font-size:16px;
        }
        #guessInput {
            width: min(300px,80vw);
            height:50px;
            border:2px solid #000;
            padding:0 14px;
            font-size:18px;
            outline:none;
        }
        .game-buttons {
            display:flex;
            gap:14px;
        }
        .game-btn {
            width:130px;
            height:48px;
            border:2px solid #000;
            background:#fff;
            font-size:17px;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div class="top-header">
        <div class="user-label" id="userLabel"></div>
        <div class="coin-bar" id="coinWrap">
            <div class="st-coin">ST</div>
            <span>ST币：<span id="stCoinNum">0</span></span>
        </div>
    </div>

    <div class="account-box" id="accountPanel">
        <div class="acc-title">SKIBIDI工作室账号系统</div>
        <input class="acc-input" id="userName" placeholder="输入账号名">
        <input class="acc-input" id="userPwd" placeholder="输入密码" type="password">
        <button class="acc-btn" id="regBtn">注册新账号</button>
        <button class="acc-btn" id="loginBtn">登录已有账号</button>
        <div class="acc-tip" id="accTip"></div>
    </div>

    <div class="login-box" id="loginScreen">
        <div class="login-title">SKIBIDI帝国工作室 准入验证</div>
        <div class="question-text">我们的家在哪？</div>
        <input type="text" id="answerInput" placeholder="在此输入答案">
        <button id="submitBtn">提交答案</button>
        <div class="error-tip" id="wrongTip">答案错误，无法进入，请重新输入</div>
    </div>

    <div class="blackMask" id="maskLayer">
        <div class="mask-text" id="maskTextWrap"></div>
    </div>

    <div class="main-page" id="workSpace">
        <h1 class="main-title">SKIBIDI 帝国的工作室</h1>
        <div class="menu-box">
            <button class="menu-btn" id="dailySign">每日签到领取10 ST币</button>
            <button class="menu-btn" id="btnHelp">寻求帮助</button>
            <button class="menu-btn" id="btnGuessGame">猜数字小游戏</button>
            <button class="menu-btn" id="btnLink">如何再次打开这个网站</button>
            <button class="menu-btn disabled-btn">我不是按钮</button>
        </div>
    </div>

    <!-- 新增：反馈弹窗 -->
    <div class="feedback-modal" id="feedModal">
        <div class="feedback-box">
            <div class="feedback-title">提交反馈</div>
            <textarea id="feedbackInput" placeholder="写下你的建议、问题..."></textarea>
            <div class="feedback-buttons">
                <button class="feed-btn" id="feedCancel">取消</button>
                <button class="feed-btn" id="feedSubmit">提交反馈</button>
            </div>
        </div>
    </div>

    <!-- 新增：猜数字游戏页面 -->
    <div class="guess-game-page" id="gamePage">
        <h2 class="game-title">猜数字 1~100</h2>
        <div class="game-range" id="rangeText">当前范围：1 ~ 100</div>
        <div class="game-record" id="recordBox">猜测记录：</div>
        <input type="number" id="guessInput" placeholder="输入你猜的数字">
        <div class="game-buttons">
            <button class="game-btn" id="submitGuess">提交猜测</button>
            <button class="game-btn" id="backHome">返回主页</button>
        </div>
    </div>

    <script>
        const correctAnswer = "郯城";
        const signReward = 10;
        const nowDate = new Date().toLocaleDateString();

        const userLabel = document.getElementById("userLabel");
        const coinWrap = document.getElementById("coinWrap");
        const stCoinNum = document.getElementById("stCoinNum");
        const dailySign = document.getElementById("dailySign");
        const accountPanel = document.getElementById("accountPanel");
        const userName = document.getElementById("userName");
        const userPwd = document.getElementById("userPwd");
        const regBtn = document.getElementById("regBtn");
        const loginBtn = document.getElementById("loginBtn");
        const accTip = document.getElementById("accTip");
        const loginScreen = document.getElementById("loginScreen");
        const workSpace = document.getElementById("workSpace");
        const maskLayer = document.getElementById("maskLayer");
        const maskTextWrap = document.getElementById("maskTextWrap");
        const answerInput = document.getElementById("answerInput");
        const submitBtn = document.getElementById("submitBtn");
        const wrongTip = document.getElementById("wrongTip");
        const pageUrl = window.location.href;

        // 反馈弹窗元素
        const btnHelp = document.getElementById("btnHelp");
        const feedModal = document.getElementById("feedModal");
        const feedbackInput = document.getElementById("feedbackInput");
        const feedCancel = document.getElementById("feedCancel");
        const feedSubmit = document.getElementById("feedSubmit");

        // 猜数字游戏元素
        const btnGuessGame = document.getElementById("btnGuessGame");
        const gamePage = document.getElementById("gamePage");
        const rangeText = document.getElementById("rangeText");
        const recordBox = document.getElementById("recordBox");
        const guessInput = document.getElementById("guessInput");
        const submitGuess = document.getElementById("submitGuess");
        const backHome = document.getElementById("backHome");

        let currentUser = null;
        // 猜数字全局变量
        let targetNum = 0;
        let minRange = 1;
        let maxRange = 100;

        function getAllAccounts(){
            let data = localStorage.getItem("skibidiAccounts");
            return data ? JSON.parse(data) : {};
        }
        function saveAccounts(accObj){
            localStorage.setItem("skibidiAccounts", JSON.stringify(accObj));
        }
        function setLoginCache(name){
            localStorage.setItem("skibidiLoginCache", name);
        }
        function getLoginCache(){
            return localStorage.getItem("skibidiLoginCache");
        }
        function setPassQuestion(name){
            localStorage.setItem("skibidiPassQ_" + name, "1");
        }
        function checkUserPassQuestion(name){
            return localStorage.getItem("skibidiPassQ_" + name) === "1";
        }

        // 欢迎开幕动画
        function playWelcomeAnimation(username) {
            maskLayer.style.display = "flex";
            maskLayer.style.opacity = "1";
            maskLayer.style.animation = "none";
            maskTextWrap.innerHTML = "";
            let text = `欢迎回家，${username}`;
            let delay = 0;
            for(let char of text){
                let span = document.createElement("span");
                span.className = "char";
                span.innerText = char;
                span.style.animation = `charShow 0.35s ${delay}s forwards`;
                maskTextWrap.appendChild(span);
                delay += 0.35;
            }
            const totalTextTime = (delay + 1.2) * 1000;
            setTimeout(()=>{
                maskLayer.style.animation = "maskFadeOut 1.5s forwards";
                maskLayer.addEventListener("animationend", function endMask(){
                    maskLayer.removeEventListener("animationend", endMask);
                    maskLayer.style.display = "none";
                    loginScreen.style.display = "none";
                    workSpace.style.display = "flex";
                    coinWrap.style.display = "flex";
                    workSpace.offsetHeight;
                    coinWrap.offsetHeight;
                })
            }, totalTextTime);
        }

        // 初始化自动登录
        function initCheckLogin(){
            let cacheName = getLoginCache();
            if(!cacheName) return;
            let allAcc = getAllAccounts();
            if(allAcc[cacheName]){
                currentUser = cacheName;
                accountPanel.style.display = "none";
                userLabel.innerText = `用户名：${currentUser}`;
                refreshCoinUI();
                checkSignStatus();
                if(checkUserPassQuestion(currentUser)){
                    playWelcomeAnimation(currentUser);
                }else{
                    loginScreen.style.display = "flex";
                }
            }
        }
        initCheckLogin();

        // 注册
        regBtn.onclick = ()=>{
            let name = userName.value.trim();
            let pwd = userPwd.value.trim();
            if(!name || !pwd){
                accTip.innerText="账号和密码不能为空";
                return;
            }
            let accounts = getAllAccounts();
            if(accounts[name]){
                accTip.innerText="该账号已存在，请直接登录";
                return;
            }
            accounts[name] = {
                password:pwd,
                stCoin:0,
                lastSignDate:""
            };
            saveAccounts(accounts);
            accTip.innerText="注册成功，请登录";
        }

        // 登录按钮
        loginBtn.onclick = ()=>{
            let name = userName.value.trim();
            let pwd = userPwd.value.trim();
            let accounts = getAllAccounts();
            if(!accounts[name]){
                accTip.innerText="账号不存在，请先注册";
                return;
            }
            if(accounts[name].password !== pwd){
                accTip.innerText="密码错误";
                return;
            }
            currentUser = name;
            setLoginCache(name);
            accountPanel.style.display = "none";
            userLabel.innerText = `用户名：${currentUser}`;
            refreshCoinUI();
            checkSignStatus();
            if(checkUserPassQuestion(currentUser)){
                playWelcomeAnimation(currentUser);
            }else{
                loginScreen.style.display = "flex";
            }
        }

        function refreshCoinUI(){
            let accounts = getAllAccounts();
            stCoinNum.innerText = accounts[currentUser].stCoin;
        }
        function checkSignStatus(){
            let accounts = getAllAccounts();
            let userData = accounts[currentUser];
            if(userData.lastSignDate === nowDate){
                dailySign.disabled = true;
                dailySign.innerText = "今日已签到，明天0点重置";
            }else{
                dailySign.disabled = false;
                dailySign.innerText = "每日签到领取10 ST币";
            }
        }
        dailySign.onclick = ()=>{
            let accounts = getAllAccounts();
            let userData = accounts[currentUser];
            userData.stCoin += signReward;
            userData.lastSignDate = nowDate;
            saveAccounts(accounts);
            refreshCoinUI();
            checkSignStatus();
            showFloatMsg(`签到成功，获得${signReward} ST币！`);
        }

        // 答题校验
        function checkAnswer() {
            const inputVal = answerInput.value.trim();
            if (inputVal === correctAnswer) {
                wrongTip.style.opacity = 0;
                setPassQuestion(currentUser);
                loginScreen.style.display = "none";
                playWelcomeAnimation(currentUser);
            } else {
                wrongTip.style.opacity = 1;
                answerInput.value = "";
            }
        }
        submitBtn.onclick = checkAnswer;
        answerInput.addEventListener("keydown", e => {
            if (e.key === "Enter") checkAnswer();
        })

        // 上浮飘字提示
        function showFloatMsg(text) {
            const oldTip = document.querySelector(".float-notice");
            if (oldTip) oldTip.remove();
            const tipDom = document.createElement("div");
            tipDom.className = "float-notice";
            tipDom.textContent = text;
            document.body.appendChild(tipDom);
        }

        // 复制链接按钮
        document.getElementById("btnLink").onclick = async () => {
            try {
                await navigator.clipboard.writeText(pageUrl);
                showFloatMsg("网站链接已复制，粘贴即可打开");
            } catch (err) {
                showFloatMsg(`网站链接：${pageUrl}`);
            }
        }

        // ========== 1、寻求帮助反馈弹窗逻辑 ==========
        btnHelp.onclick = ()=>{
            feedModal.style.display = "flex";
            feedbackInput.focus(); // 自动唤起输入键盘
        }
        feedCancel.onclick = ()=>{
            feedModal.style.display = "none";
            feedbackInput.value = "";
        }
        feedSubmit.onclick = ()=>{
            feedModal.style.display = "none";
            feedbackInput.value = "";
            showFloatMsg("感谢您的反馈");
        }

        // ========== 2、猜数字游戏完整逻辑 ==========
        // 打开猜数字页面，初始化游戏
        btnGuessGame.onclick = ()=>{
            workSpace.style.display = "none";
            gamePage.style.display = "flex";
            resetGame();
        }
        // 返回主页
        backHome.onclick = ()=>{
            gamePage.style.display = "none";
            workSpace.style.display = "flex";
        }
        // 重置游戏，生成新数字，清空记录
        function resetGame(){
            targetNum = Math.floor(Math.random()*100)+1;
            minRange = 1;
            maxRange = 100;
            rangeText.innerText = `当前范围：${minRange} ~ ${maxRange}`;
            recordBox.innerHTML = "猜测记录：<br>";
            guessInput.value = "";
        }
        // 提交猜测
        function submitGuessNum(){
            let val = Number(guessInput.value.trim());
            if(isNaN(val) || val < minRange || val > maxRange){
                showFloatMsg(`请输入${minRange}到${maxRange}之间有效数字`);
                return;
            }
            // 写入记录
            let recordText = "";
            if(val < targetNum){
                recordText = `你猜：${val}，猜小了，范围更新为${val} ~ ${maxRange}`;
                minRange = val;
            }else if(val > targetNum){
                recordText = `你猜：${val}，猜大了，范围更新为${minRange} ~ ${val}`;
                maxRange = val;
            }else{
                recordText = `你猜：${val}，恭喜猜对！数字就是${targetNum}`;
            }
            recordBox.innerHTML += recordText + "<br>";
            rangeText.innerText = `当前范围：${minRange} ~ ${maxRange}`;
            guessInput.value = "";
            // 猜对自动重置
            if(val === targetNum){
                setTimeout(()=>{
                    showFloatMsg("游戏通关，开启新一局");
                    resetGame();
                },1200);
            }
        }
        submitGuess.onclick = submitGuessNum;
        guessInput.addEventListener("keydown",e=>{
            if(e.key === "Enter") submitGuessNum();
        })
    </script>
</body>
</html>
