<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKIBIDI 帝国的工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #ffffff;
            font-family: "KaiTi", "楷体", serif;
            overflow: hidden;
        }
        /* 简答题登录界面 */
        .login-box {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        .login-title {
            font-size: 32px;
            color: #000;
            text-align: center;
        }
        .question-text {
            font-size: 22px;
            color: #000;
        }
        #answerInput {
            width: min(300px, 80vw);
            height: 52px;
            font-size: 18px;
            border: 2px solid black;
            padding: 0 15px;
            outline: none;
        }
        #submitBtn {
            width: min(300px, 80vw);
            height: 52px;
            font-size: 18px;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            cursor: pointer;
            transition: transform 0.15s;
        }
        #submitBtn:active {
            transform: scale(1.05);
        }
        .error-tip {
            color: red;
            font-size: 18px;
            opacity: 0;
        }
        /* 黑屏过渡遮罩层 */
        .blackMask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .mask-text {
            font-size: 60px;
            color: #fff;
            font-family: "KaiTi",楷体;
            opacity: 0;
        }
        /* 工作室主界面（默认隐藏） */
        .main-page {
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            gap: 60px;
        }
        .main-title {
            font-size: 36px;
            color: #000000;
            white-space: nowrap;
        }
        .btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .common-btn {
            width: min(320px, 85vw);
            height: 56px;
            font-size: 19px;
            border: 2px solid #000;
            border-radius: 12px;
            background: #fff;
            color: #000;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .common-btn:active {
            transform: scale(1.05);
        }
        .disabled-btn {
            pointer-events: none;
        }
        .float-notice {
            position: fixed;
            left: 50%;
            top: 42%;
            transform: translateX(-50%);
            font-size: 20px;
            color: #000000;
            white-space: nowrap;
            opacity: 0;
            z-index: 999;
            animation: floatUp 2.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, 0); }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -120px); }
        }
        /* 遮罩文字渐显动画 */
        @keyframes textShow {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 1; }
        }
        /* 遮罩缓慢消失动画 */
        @keyframes maskFadeOut {
            from { opacity: 1; }
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <!-- 简答题登录页面 -->
    <div class="login-box" id="loginScreen">
        <div class="login-title">SKIBIDI帝国工作室 准入验证</div>
        <div class="question-text">我们的家在哪？</div>
        <input type="text" id="answerInput" placeholder="在此输入答案">
        <button id="submitBtn">提交答案</button>
        <div class="error-tip" id="wrongTip">答案错误，无法进入，请重新输入</div>
    </div>

    <!-- 黑屏过渡遮罩 -->
    <div class="blackMask" id="maskLayer">
        <div class="mask-text">欢迎回家</div>
    </div>

    <!-- 工作室主页面（初始隐藏） -->
    <div class="main-page" id="workSpace">
        <h1 class="main-title">SKIBIDI 帝国的工作室</h1>
        <div class="btn-wrapper">
            <button class="common-btn" id="btnHelp">寻求帮助</button>
            <button class="common-btn" id="btnFind">寻找天保</button>
            <button class="common-btn" id="btnLink">如何再次打开这个网站</button>
            <button class="common-btn disabled-btn">我不是按钮</button>
        </div>
    </div>

    <script>
        const correctAnswer = "郯城";
        const loginScreen = document.getElementById("loginScreen");
        const workSpace = document.getElementById("workSpace");
        const maskLayer = document.getElementById("maskLayer");
        const maskText = document.querySelector(".mask-text");
        const answerInput = document.getElementById("answerInput");
        const submitBtn = document.getElementById("submitBtn");
        const wrongTip = document.getElementById("wrongTip");
        const pageUrl = window.location.href;

        // 提交答案逻辑
        function checkAnswer() {
            const inputVal = answerInput.value.trim();
            if (inputVal === correctAnswer) {
                wrongTip.style.opacity = 0;
                // 显示黑色遮罩
                maskLayer.style.display = "flex";
                maskText.style.animation = "textShow 1.2s forwards";
                // 等待文字展示完成，再让黑幕慢慢消失
                setTimeout(() => {
                    maskLayer.style.animation = "maskFadeOut 1.5s forwards";
                    loginScreen.style.display = "none";
                    workSpace.style.display = "flex";
                }, 1800);
            } else {
                wrongTip.style.opacity = 1;
                answerInput.value = "";
            }
        }
        submitBtn.onclick = checkAnswer;
        answerInput.addEventListener("keydown", e => {
            if (e.key === "Enter") checkAnswer();
        })

        // 漂浮提示文字函数
        function showFloatMsg(text) {
            const oldTip = document.querySelector(".float-notice");
            if (oldTip) oldTip.remove();
            const tipDom = document.createElement("div");
            tipDom.className = "float-notice";
            tipDom.textContent = text;
            document.body.appendChild(tipDom);
        }

        // 功能按钮逻辑
        document.getElementById("btnHelp").onclick = () => {
            showFloatMsg("等待审核员审核");
        }
        document.getElementById("btnFind").onclick = () => {
            showFloatMsg("天保是永远找不来的");
        }
        document.getElementById("btnLink").onclick = async () => {
            try {
                await navigator.clipboard.writeText(pageUrl);
                showFloatMsg("网站链接已复制，粘贴即可打开");
            } catch (err) {
                showFloatMsg(`网站链接：${pageUrl}`);
            }
        }
    </script>
</body>
</html>
