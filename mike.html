<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 手机平板自适应适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKIBIDI 帝国的工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #ffffff; /* 纯白背景 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            gap: 60px;
        }
        /* 标题：楷体黑色，缩小字号，移动端单行不换行 */
        .main-title {
            font-family: "KaiTi", "楷体", serif;
            font-size: 36px;
            color: #000000;
            white-space: nowrap;
            overflow: visible;
            text-align: center;
        }
        /* 按钮容器垂直均匀排布 */
        .btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        /* 全部按钮统一样式：白底黑边黑字，高对比 */
        .common-btn {
            width: min(320px, 85vw);
            height: 56px;
            font-size: 19px;
            font-family: "KaiTi", "楷体", serif;
            border: 2px solid #000;
            border-radius: 12px;
            background: #fff;
            color: #000;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        /* 点击放大效果 */
        .common-btn:active {
            transform: scale(1.05);
        }
        /* 第四个按钮外观完全一致，仅点击失效 */
        .disabled-btn {
            pointer-events: none;
        }
        /* 漂浮提示文字：缩小字号，黑色，适配屏幕不遮挡画面 */
        .float-notice {
            position: fixed;
            left: 50%;
            top: 42%;
            transform: translateX(-50%);
            font-family: "KaiTi", "楷体", serif;
            font-size: 20px; /* 缩小飘文字号 */
            color: #000000;
            white-space: nowrap;
            opacity: 0;
            z-index: 999;
            animation: floatUp 2.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, 0); }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -120px); }
        }
    </style>
</head>
<body>
    <h1 class="main-title">SKIBIDI 帝国的工作室</h1>

    <div class="btn-wrapper">
        <button class="common-btn" id="btnHelp">寻求帮助</button>
        <button class="common-btn" id="btnFind">寻找天保</button>
        <button class="common-btn" id="btnLink">如何再次打开这个网站</button>
        <button class="common-btn disabled-btn">我不是按钮</button>
    </div>

    <script>
        const pageUrl = window.location.href;

        function showFloatMsg(text) {
            const oldTip = document.querySelector(".float-notice");
            if (oldTip) oldTip.remove();
            const tipDom = document.createElement("div");
            tipDom.className = "float-notice";
            tipDom.textContent = text;
            document.body.appendChild(tipDom);
        }

        document.getElementById("btnHelp").onclick = () => {
            showFloatMsg("等待审核员审核");
        }

        document.getElementById("btnFind").onclick = () => {
            showFloatMsg("天保是永远找不来的");
        }

        document.getElementById("btnLink").onclick = async () => {
            try {
                await navigator.clipboard.writeText(pageUrl);
                showFloatMsg("网站链接已复制，粘贴即可打开");
            } catch (err) {
                showFloatMsg(`网站链接：${pageUrl}`);
            }
        }
    </script>
</body>
</html>
